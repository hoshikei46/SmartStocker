<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>給食おたよりメーカー Pro</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    @media print {
      @page { size: B5 portrait; margin: 0; }
      body { background: white !important; margin: 0; padding: 0; }
      #printable-area { 
        width: 182mm !important; 
        min-height: 257mm !important; 
        padding: 10mm !important; 
        margin: 0 !important;
        border: none !important;
        box-shadow: none !important;
      }
    }
    .preview-container {
      background-color: #e5e7eb;
      padding: 40px 20px;
      overflow-y: auto;
      display: flex;
      justify-content: center;
    }
    #printable-area {
      background-color: white;
      width: 182mm;
      min-height: 257mm;
      padding: 10mm;
      box-sizing: border-box;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      position: relative;
      color: black;
    }
    #printable-area::after {
      content: "--- 1ページ目の下端 (B5) ---";
      position: absolute;
      top: 257mm;
      left: 0;
      width: 100%;
      border-top: 2px dashed #ff4444;
      color: #ff4444;
      font-size: 10px;
      text-align: center;
      pointer-events: none;
      display: block;
    }
    .unified-text { font-size: var(--font-size, 12.5pt); line-height: 2.0; word-break: break-all; }
    .unified-text ruby { ruby-align: center; ruby-position: over; }
    .unified-text rt { font-size: 0.6em; color: #333; line-height: 1; transform: translateY(-10%); }
  </style>
</head>
<body class="bg-orange-50 font-sans text-gray-800 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const SHARED_PASSWORD = "otayori1234";

    const firebaseConfig = {
      apiKey: "AIzaSyBA4GCW-DXP2SenQBotyF0G5PVZ5IPrpTc",
      authDomain: "work-stock-app.firebaseapp.com",
      projectId: "work-stock-app",
      storageBucket: "work-stock-app.firebasestorage.app",
      messagingSenderId: "283214115928",
      appId: "1:283214115928:web:0a8408714655fc9d55062d"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const defaultTemplates = {
      1: "食べる時の姿勢も大切です。背中をまっすぐ伸ばして、食器をきちんと持って食べると、消化も良くなりますよ。\nそれでは、おいしくいただきましょう。",
      2: "食事をするときは、「よくかむ」ことを意識してみましょう。しっかりかんで、味わってみてください。\nそれでは、おいしくいただきましょう。",
      3: "給食はいつも、赤色、黄色、緑色の栄養がそろうように作られています。苦手なものも、ひとくちだけでもチャレンジして、バランスよく食べましょう。\nそれでは、おいしくいただきましょう。",
      4: "今日の給食も、給食室の調理員さんたちが、朝早くから一生懸命つくってくれました。感謝の気持ちをこめて、残さずいただきましょう。\nそれでは、おいしくいただきましょう。",
      5: "今日で今週の給食は終わりです。明日からの週末も、お家でしっかり食事をとり、元気にすごしてください。\nそれでは、おいしくいただきましょう。"
    };

    function App() {
      const [isUnlocked, setIsUnlocked] = useState(false);
      const [inputPassword, setInputPassword] = useState('');
      const [passError, setPassError] = useState('');

      const [apiKey, setApiKey] = useState('');
      const [modelName, setModelName] = useState('gemini-2.5-flash');
      const [showSettings, setShowSettings] = useState(false);
      const [showTemplateSettings, setShowTemplateSettings] = useState(false);
      const [templates, setTemplates] = useState(defaultTemplates);
      
      const getTodayJST = () => {
        const now = new Date();
        const jst = new Date(now.getTime() + 9 * 60 * 60 * 1000);
        return jst.toISOString().split('T')[0];
      };
      const [date, setDate] = useState(getTodayJST());
      const [menu, setMenu] = useState('');
      const [themes, setThemes] = useState(['', '', '']);
      const [memo, setMemo] = useState('');
      const [rubyMenu, setRubyMenu] = useState('');
      const [rubyMemo, setRubyMemo] = useState('');

      const [fontSize, setFontSize] = useState(12.5);
      const [isLoading, setIsLoading] = useState(false);
      const [isSaving, setIsSaving] = useState(false);
      const [aiOptions, setAiOptions] = useState([]);
      const [showOptionsModal, setShowOptionsModal] = useState(false);
      const [activeTab, setActiveTab] = useState('edit');
      const [isMobile, setIsMobile] = useState(window.innerWidth < 768);

      useEffect(() => {
        if (localStorage.getItem('kyushoku_app_unlocked') === 'true') setIsUnlocked(true);
        const handleResize = () => setIsMobile(window.innerWidth < 768);
        window.addEventListener('resize', handleResize);
        return () => window.removeEventListener('resize', handleResize);
      }, []);

      useEffect(() => {
        if (!isUnlocked || !db) return;
        
        const loadData = async () => {
          const doc = await db.collection("lunch_newsletters").doc(date).get();
          if (doc.exists) {
            const data = doc.data();
            setMenu(data.menu || "");
            setThemes(data.themes || [data.theme || "", "", ""]);
            setMemo(data.memo || "");
            setRubyMenu(data.rubyMenu || "");
            setRubyMemo(data.rubyMemo || "");
          } else {
            setMenu(""); setThemes(["", "", ""]); setMemo(""); setRubyMenu(""); setRubyMemo("");
          }
        };

        const loadSharedSettings = async () => {
          try {
            const apiDoc = await db.collection("system_settings").doc("api_config").get();
            if (apiDoc.exists) {
              const data = apiDoc.data();
              if (data.apiKey) setApiKey(data.apiKey);
              if (data.modelName) setModelName(data.modelName);
            }
            const tmplDoc = await db.collection("system_settings").doc("templates").get();
            if (tmplDoc.exists && tmplDoc.data().templates) {
              setTemplates(tmplDoc.data().templates);
            }
          } catch (e) { console.error(e); }
        };

        loadData();
        loadSharedSettings();
      }, [date, isUnlocked]);

      const handleLogin = (e) => {
        e.preventDefault();
        if (inputPassword === SHARED_PASSWORD) {
          localStorage.setItem('kyushoku_app_unlocked', 'true');
          setIsUnlocked(true);
          setPassError('');
        } else {
          setPassError('パスワードが違います');
        }
      };

      const handleLogout = () => {
        localStorage.removeItem('kyushoku_app_unlocked');
        setIsUnlocked(false);
        setInputPassword('');
      };

      const saveApiSettings = async () => {
        try {
          await db.collection("system_settings").doc("api_config").set({ apiKey, modelName });
          alert("API設定をクラウドに保存しました。\nこれで他の先生もAI機能を使えます！");
          setShowSettings(false);
        } catch (e) { alert("保存に失敗しました。"); }
      };

      const saveSharedTemplates = async () => {
        try {
          await db.collection("system_settings").doc("templates").set({ templates });
          alert("定型文をクラウドに保存しました。\n他の先生の画面にも反映されます！");
          setShowTemplateSettings(false);
        } catch (e) { alert("保存に失敗しました。"); }
      };

      const exportToCSV = async () => {
        const snapshot = await db.collection("lunch_newsletters").get();
        if (snapshot.empty) { alert("データがありません"); return; }
        const rows = [["id", "menu", "themes", "memo", "rubyMenu", "rubyMemo"]];
        snapshot.forEach(doc => {
          const d = doc.data();
          rows.push([doc.id, d.menu, JSON.stringify(d.themes || []), d.memo, d.rubyMenu, d.rubyMemo]);
        });
        const csvContent = rows.map(r => r.map(c => `"${(c||"").replace(/"/g, '""')}"`).join(",")).join("\n");
        const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `給食おたよりバックアップ_${new Date().toISOString().split('T')[0]}.csv`;
        link.click();
      };

      const importFromCSV = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (event) => {
          const lines = event.target.result.split("\n").slice(1);
          for (let line of lines) {
            const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').replace(/""/g, '"'));
            if (cols[0]) {
              await db.collection("lunch_newsletters").doc(cols[0]).set({
                menu: cols[1], themes: JSON.parse(cols[2] || "[]"), memo: cols[3], rubyMenu: cols[4], rubyMemo: cols[5]
              });
            }
          }
          alert("インポート完了");
          location.reload();
        };
        reader.readAsText(file);
      };

      const clearData = async () => {
        if (!window.confirm(`${formatDate(date)} の内容をすべて消去しますか？\nこの操作は元に戻せません。`)) return;
        setMenu(''); setThemes(['', '', '']); setMemo(''); setRubyMenu(''); setRubyMemo('');
        try { await db.collection("lunch_newsletters").doc(date).delete(); } catch (e) {}
      };

      const saveToFirebase = async (silent = false) => {
        setIsSaving(true);
        try {
          await db.collection("lunch_newsletters").doc(date).set({ menu, themes, memo, rubyMenu, rubyMemo });
          if (!silent) alert("保存完了");
          return true;
        } catch (e) {
          if (!silent) alert("保存失敗");
          return false;
        } finally { setIsSaving(false); }
      };

      const handlePrint = async () => {
        setIsSaving(true);
        try { await db.collection("lunch_newsletters").doc(date).set({ menu, themes, memo, rubyMenu, rubyMemo }); } catch (e) {}
        setIsSaving(false);
        const printContent = document.getElementById("printable-area").innerHTML;
        document.body.innerHTML = `<div style="width: 182mm; padding: 10mm; box-sizing: border-box; background: white; color: black; --font-size: ${fontSize}pt;">${printContent}</div>`;
        window.print();
        location.reload();
      };

      // ==========================================
      // ★ 最強のAI分割プログラム（バグ修正）
      // ==========================================
      const generateMemoWithAI = async () => {
        if (!apiKey) { alert("右上の⚙️設定から、Gemini APIキーを登録してください。"); setShowSettings(true); return; }
        setIsLoading(true);
        
        const themeInstructions = [0,1,2].map(i => themes[i] ? `案${i+1}のテーマは「${themes[i]}」` : `案${i+1}は自由に`).join('、');
        
        // プロンプトをさらに明確に指定
        const prompt = `小学校の栄養教諭として、給食ひとくちメモを100〜150文字程度で【3パターン】作成してください。文体は必ずです・ます調（丁寧語）で統一してください。${themeInstructions}。
必ず以下のフォーマットで出力してください。他の記号や前置きは絶対に不要です。

【案1】
(1つめの文章)
【案2】
(2つめの文章)
【案3】
(3つめの文章)

献立名: ${menu}`;

        try {
          const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
          });
          const data = await res.json();
          if (data.error) throw new Error(data.error.message);
          
          let aiText = data.candidates[0].content.parts[0].text;
          
          // AIが勝手に出した区切り線（===や---）を削除
          aiText = aiText.replace(/===/g, '').replace(/---/g, '');
          
          // 「【案1】」「【案2】」「【案3】」という見出しを基準に強制分割！
          const splitOptions = aiText.split(/【案\d】/g)
            .map(t => t.trim())
            .filter(t => t.length > 0); // 空の文字を削除
            
          if (splitOptions.length > 0) {
            setAiOptions(splitOptions);
            setShowOptionsModal(true);
          } else {
            alert("AIの回答を正しく読み取れませんでした。もう一度お試しください。");
          }
        } catch (e) { 
          alert("AIエラー: API
